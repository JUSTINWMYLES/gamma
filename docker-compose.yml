version: "3.9"

services:
  # ── Colyseus game server ──────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "2567:2567"
    environment:
      PORT: 2567
      LOG_LEVEL: info
      RECONNECT_GRACE_SECONDS: 30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2567/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Unified client (served by nginx) ─────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/app/Dockerfile
      args:
        VITE_SERVER_URL: ws://localhost:2567
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
