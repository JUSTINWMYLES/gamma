# helm/gamma-operator/values.yaml
#
# Default values for the gamma-operator Helm chart.
# This chart installs ONLY the operator. All game resources
# (server, client, Redis) are created by the operator when
# you apply a GammaInstance custom resource.
#
# Override these with --set or a custom values file.

# ── Operator image ────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/gamma/gamma-operator
  tag: latest
  pullPolicy: IfNotPresent

# ── Replica count for the operator deployment ─────────────────────────────────
replicaCount: 1

# ── Service account ───────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: gamma-operator
  annotations: {}

# ── RBAC ──────────────────────────────────────────────────────────────────────
rbac:
  create: true

# ── CRD installation ──────────────────────────────────────────────────────────
crds:
  install: true   # Set to false if you manage CRDs separately

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# ── Leader election (required for HA) ────────────────────────────────────────
leaderElection:
  enabled: true

# ── Metrics / monitoring ──────────────────────────────────────────────────────
metrics:
  enabled: true
  port: 8080

# ── Log level ─────────────────────────────────────────────────────────────────
logLevel: info

# ── Pod security ─────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# ── Node affinity / tolerations ───────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
