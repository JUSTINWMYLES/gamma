{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gammainstances.gamma.io
  labels:
    {{- include "gamma-operator.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: "(devel)"
spec:
  group: gamma.io
  names:
    kind: GammaInstance
    listKind: GammaInstanceList
    plural: gammainstances
    singular: gammainstance
    shortNames: [gi]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [server, client]
              properties:
                server:
                  type: object
                  required: [image]
                  properties:
                    image:
                      type: string
                      description: Container image for the Gamma Colyseus server.
                    replicas:
                      type: integer
                      default: 1
                      minimum: 1
                      maximum: 100
                      description: Number of server pod replicas.
                    port:
                      type: integer
                      default: 2567
                      minimum: 1024
                      maximum: 65535
                      description: Port the Colyseus server listens on.
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu: { type: string, default: "100m" }
                            memory: { type: string, default: "128Mi" }
                        limits:
                          type: object
                          properties:
                            cpu: { type: string, default: "500m" }
                            memory: { type: string, default: "512Mi" }
                    env:
                      type: array
                      description: Additional environment variables injected into server pods.
                      items:
                        type: object
                        required: [name, value]
                        properties:
                          name: { type: string }
                          value: { type: string }
                    secretEnvVars:
                      type: array
                      description: >
                        Environment variables loaded from Kubernetes Secrets.
                        Use this for sensitive values such as third-party API keys
                        (e.g. a GIF service API key) that must not be stored in
                        plain text in the CR spec.
                      items:
                        type: object
                        required: [name, secretName, secretKey]
                        properties:
                          name:
                            type: string
                            description: Name of the environment variable in the container.
                          secretName:
                            type: string
                            description: Name of the Kubernetes Secret in the same namespace.
                          secretKey:
                            type: string
                            description: Key within the Secret whose value will be used.
                client:
                  type: object
                  required: [image]
                  properties:
                    image:
                      type: string
                      description: Container image for the Gamma client (nginx SPA).
                    replicas:
                      type: integer
                      default: 1
                      minimum: 1
                      maximum: 100
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu: { type: string, default: "50m" }
                            memory: { type: string, default: "32Mi" }
                        limits:
                          type: object
                          properties:
                            cpu: { type: string, default: "100m" }
                            memory: { type: string, default: "64Mi" }
                redis:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                      description: Deploy a Redis StatefulSet for game state.
                    image:
                      type: string
                      default: "redis:7-alpine"
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu: { type: string, default: "100m" }
                            memory: { type: string, default: "128Mi" }
                        limits:
                          type: object
                          properties:
                            cpu: { type: string, default: "250m" }
                            memory: { type: string, default: "256Mi" }
                    storage:
                      type: object
                      properties:
                        size:
                          type: string
                          default: "1Gi"
                          description: PVC size for Redis data.
                        storageClassName:
                          type: string
                          description: StorageClass name. Empty uses cluster default.
                networking:
                  type: object
                  properties:
                    ingress:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        className:
                          type: string
                          default: nginx
                        host:
                          type: string
                          description: Hostname for the Ingress resource.
                        tls:
                          type: object
                          properties:
                            enabled: { type: boolean, default: false }
                            secretName: { type: string }
                        annotations:
                          type: object
                          additionalProperties: { type: string }
                autoscaling:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: Create an HPA for the server Deployment.
                    minReplicas:
                      type: integer
                      default: 1
                      minimum: 1
                    maxReplicas:
                      type: integer
                      default: 10
                    targetCPUUtilizationPercentage:
                      type: integer
                      default: 70
                region:
                  type: string
                  description: Informational region label for future multi-region federation.
                observability:
                  type: object
                  description: >
                    Configures OpenTelemetry tracing and metrics export for the server.
                    When omitted the server uses its own built-in defaults.
                  properties:
                    enabled:
                      type: boolean
                      description: >
                        Enable or disable OpenTelemetry telemetry. When true, OTEL_ENABLED=true
                        is injected and telemetry is pushed to the configured otlpEndpoint.
                        When false, OTEL_ENABLED=false is injected, disabling all traces and
                        metrics. When omitted, no OTEL_* env vars are set.
                    otlpEndpoint:
                      type: string
                      description: >
                        Base URL of an OpenTelemetry Collector accepting OTLP/HTTP
                        (e.g. http://otel-collector.monitoring.svc:4318). Traces are
                        sent to <otlpEndpoint>/v1/traces and metrics to
                        <otlpEndpoint>/v1/metrics every 10 seconds.
                    serviceName:
                      type: string
                      description: >
                        Overrides the OTEL service name reported in traces and metrics.
                        Defaults to "gamma-server" when not set.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Deploying, Running, Degraded, Failed]
                serverReadyReplicas:
                  type: integer
                clientReadyReplicas:
                  type: integer
                redisReady:
                  type: boolean
                serverEndpoint:
                  type: string
                clientEndpoint:
                  type: string
                redisEndpoint:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Server
          type: integer
          jsonPath: .status.serverReadyReplicas
        - name: Client
          type: integer
          jsonPath: .status.clientReadyReplicas
        - name: Redis
          type: boolean
          jsonPath: .status.redisReady
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
