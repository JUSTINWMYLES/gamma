
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamma</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #f0eef8;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
gap: 64px;
}

body::before {
content: '';
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(140,100,220,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(140,100,220,0.05) 1px, transparent 1px);
background-size: 36px 36px;
pointer-events: none;
}

/* ── LOGO ── */
.logo-wrap {
position: relative;
width: 150px;
height: 150px;
animation: logoPulse 4s ease-in-out infinite;
}

@keyframes logoPulse {
0%,100% { filter: drop-shadow(0 4px 24px rgba(124,111,173,0.3)); }
50%     { filter: drop-shadow(0 4px 40px rgba(124,111,173,0.55)); }
}

.logo-layer {
position: absolute;
inset: 0;
}
.logo-layer svg { width: 100%; height: 100%; }

.logo-layer.base { z-index: 3; }

.logo-layer.mg {
z-index: 2;
mix-blend-mode: multiply;
animation: logoMg 4s steps(1) infinite;
}
.logo-layer.tl {
z-index: 2;
mix-blend-mode: multiply;
animation: logoTl 4s steps(1) infinite;
}

@keyframes logoMg {
0%,88%  { transform:translate(0,0); opacity:0; }
89%     { transform:translate(-6px,2px); opacity:0.9; }
90%     { opacity:0; }
94%     { transform:translate(-4px,0); opacity:0.75; }
95%     { opacity:0; }
100%    { opacity:0; }
}
@keyframes logoTl {
0%,88%  { transform:translate(0,0); opacity:0; }
89%     { transform:translate(6px,-2px); opacity:0.9; }
90%     { opacity:0; }
94%     { transform:translate(4px,1px); opacity:0.75; }
95%     { opacity:0; }
100%    { opacity:0; }
}

/* ── WORDMARK ── */
.wordmark-wrap {
position: relative;
display: flex;
align-items: center;
justify-content: center;
}

.wordmark-glow {
position: absolute;
inset: -30px -60px;
background: radial-gradient(ellipse at center, rgba(124,111,173,0.18) 0%, transparent 70%);
pointer-events: none;
animation: glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse {
0%,100% { opacity:0.7; }
50%     { opacity:1; }
}

.wordmark {
position: relative;
font-family: 'Bebas Neue', sans-serif;
font-size: 112px;
letter-spacing: 0.1em;
line-height: 1;
user-select: none;
white-space: nowrap;
z-index: 1;
}

.wordmark .layer {
display: block;
position: absolute;
top: 0; left: 0;
white-space: nowrap;
}

.wordmark .base {
position: relative;
color: #9b93b8;
z-index: 3;
}

.wordmark .mg {
color: #cc6ab5;
z-index: 2;
mix-blend-mode: multiply;
animation: wmMg 3.8s steps(1) infinite;
}

.wordmark .tl {
color: #5bbfb5;
z-index: 2;
mix-blend-mode: multiply;
animation: wmTl 3.8s steps(1) infinite;
}

@keyframes wmMg {
0%,84%  { opacity:0; clip-path:inset(100% 0 0 0); transform:translate(0); }
85%     { opacity:1; clip-path:inset(12% 0 52% 0); transform:translate(-7px,0); }
86%     { opacity:0; }
90%     { opacity:1; clip-path:inset(58% 0 8% 0);  transform:translate(-5px,1px); }
91%     { opacity:0; }
95%     { opacity:1; clip-path:inset(32% 0 38% 0); transform:translate(-4px,0); }
96%     { opacity:0; }
100%    { opacity:0; }
}

@keyframes wmTl {
0%,84%  { opacity:0; clip-path:inset(100% 0 0 0); transform:translate(0); }
85%     { opacity:1; clip-path:inset(52% 0 12% 0); transform:translate(7px,0); }
86%     { opacity:0; }
90%     { opacity:1; clip-path:inset(8% 0 58% 0);  transform:translate(5px,-1px); }
91%     { opacity:0; }
95%     { opacity:1; clip-path:inset(38% 0 32% 0); transform:translate(4px,0); }
96%     { opacity:0; }
100%    { opacity:0; }
}

/* scan lines */
.wordmark-wrap::after {
content: '';
position: absolute;
inset: 0;
background: repeating-linear-gradient(
180deg,
transparent 0px,
transparent 3px,
rgba(124,111,173,0.05) 3px,
rgba(124,111,173,0.05) 4px
);
pointer-events: none;
z-index: 10;
}

.label {
font-family: 'Bebas Neue', sans-serif;
letter-spacing: 0.35em;
font-size: 13px;
color: #b0a8cc;
margin-top: -52px;
}
</style>

</head>
<body>

  <!-- LOGO -->

  <div class="logo-wrap">


<div class="logo-layer tl">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="8" width="84" height="84" rx="20" fill="#dff0ee"/>
    <!-- Γ: top bar full width, left stem only -->
    <rect x="18" y="20" width="62" height="18" rx="6" fill="#5bbfb5"/>
    <rect x="18" y="20" width="18" height="60" rx="6" fill="#5bbfb5"/>
  </svg>
</div>

<div class="logo-layer mg">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="8" width="84" height="84" rx="20" fill="#f0e0ee"/>
    <rect x="18" y="20" width="62" height="18" rx="6" fill="#cc6ab5"/>
    <rect x="18" y="20" width="18" height="60" rx="6" fill="#cc6ab5"/>
  </svg>
</div>

<div class="logo-layer base">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="8" width="84" height="84" rx="20" fill="#eceaf8"/>
    <!-- Γ: top horizontal bar + left vertical stem = uppercase Gamma -->
    <rect x="18" y="20" width="62" height="18" rx="6" fill="#7c6fad"/>
    <rect x="18" y="20" width="18" height="60" rx="6" fill="#7c6fad"/>
  </svg>
</div>


  </div>

  <!-- WORDMARK -->

  <div class="wordmark-wrap">
    <div class="wordmark-glow"></div>
    <div class="wordmark">
      <span class="layer mg">GAMMA</span>
      <span class="layer tl">GAMMA</span>
      <span class="base">GAMMA</span>
    </div>
  </div>

  <div class="label">Party Game Platform</div>

</body>
</html>
