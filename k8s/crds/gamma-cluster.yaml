# k8s/crds/gamma-cluster.yaml
#
# GammaCluster — registers a spoke cluster with the Gamma operator hub.
# The hub operator watches GammaCluster resources and maintains a registry
# of available clusters for game server scheduling.

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gammaclusters.gamma.io
spec:
  group: gamma.io
  names:
    kind: GammaCluster
    listKind: GammaClusterList
    plural: gammaclusters
    singular: gammacluster
    shortNames: [gc]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [region, kubeConfigSecretRef]
              properties:
                region:
                  type: string
                  description: Human-readable region label (e.g. "us-east-1")
                kubeConfigSecretRef:
                  type: object
                  description: Reference to a Secret containing a kubeconfig for this cluster
                  required: [name, namespace]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                maxGameServers:
                  type: integer
                  default: 50
                  description: Maximum game server pods this spoke will accept
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Arbitrary labels for routing policies
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Ready, Degraded, Unreachable]
                activeGameServers:
                  type: integer
                lastHeartbeat:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Region
          type: string
          jsonPath: .spec.region
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Active
          type: integer
          jsonPath: .status.activeGameServers
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
