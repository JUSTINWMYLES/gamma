# k8s/examples/basic.yaml
#
# Minimal GammaInstance — deploys Gamma with sensible defaults.
# Good starting point for development or small deployments.

apiVersion: gamma.io/v1alpha1
kind: GammaInstance
metadata:
  name: gamma-dev
  namespace: gamma
spec:
  server:
    image: ghcr.io/gamma/gamma-server:latest
    replicas: 1
    env:
      - name: LOG_LEVEL
        value: "info"
      - name: RECONNECT_GRACE_SECONDS
        value: "30"

  client:
    image: ghcr.io/gamma/gamma-client:latest
    replicas: 1
    # Optional when the app is served from the same public host and can derive /ws.
    # Set explicitly when the Colyseus endpoint is on a different host or path.
    # serverUrl: wss://gamma.example.com/ws

  redis:
    enabled: true

  # Optional News Broadcast TTS stack. Requires redis.enabled: true.
  # Browsers still fetch audio through the Gamma server proxy.
  # Change MinIO credentials before exposing the deployment externally.
  # tts:
  #   enabled: true
  #   minio:
  #     credentials:
  #       accessKey: REPLACE_ME
  #       secretKey: REPLACE_ME
