# k8s/examples/registry-14-deployment.yaml
#
# Example: Deploy registry-14 with minimal resources on a local spoke cluster.

apiVersion: gamma.io/v1alpha1
kind: GammaGameDeployment
metadata:
  name: dont-get-caught-dev
  namespace: gamma-games
  labels:
    game: registry-14-dont-get-caught
    env: dev
spec:
  gameId: registry-14-dont-get-caught
  image: ghcr.io/gamma/gamma-server:latest
  version: latest
  replicas: 2
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  config:
    LOG_LEVEL: info
    RECONNECT_GRACE_SECONDS: "30"
  port: 2567
  # targetCluster: my-spoke-cluster  # Uncomment to pin to a specific spoke
