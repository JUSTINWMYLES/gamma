# k8s/examples/gamma-cluster-example.yaml
# Register a spoke cluster with the hub operator

apiVersion: gamma.io/v1alpha1
kind: GammaCluster
metadata:
  name: spoke-us-east
spec:
  region: us-east-1
  kubeConfigSecretRef:
    name: spoke-us-east-kubeconfig
    namespace: gamma-system
  maxGameServers: 20
  labels:
    tier: dev
    region: us-east

---
# k8s/examples/gamma-operator-policy-example.yaml
apiVersion: gamma.io/v1alpha1
kind: GammaOperatorPolicy
metadata:
  name: default-policy
spec:
  defaultReplicas: 1
  maxReplicasPerCluster: 10
  autoScaling:
    enabled: true
    targetConcurrentRooms: 8
    minReplicas: 1
    maxReplicas: 5
    scaleDownCooldownSeconds: 180
  routing:
    strategy: least-loaded
  security:
    rateLimitRoomsPerMinute: 30
    maxPlayersPerRoom: 12
    allowedImagePrefixes:
      - "ghcr.io/gamma/"

---
# k8s/examples/gamma-hub-request-example.yaml
apiVersion: gamma.io/v1alpha1
kind: GammaHubRequest
metadata:
  name: deploy-registry-14
  namespace: gamma-system
spec:
  action: DeployGame
  targetCluster: spoke-us-east
  gameDeploymentRef: dont-get-caught-dev
  ttlSeconds: 600
