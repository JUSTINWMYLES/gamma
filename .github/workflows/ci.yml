name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Server: type-check + unit tests ────────────────────────────────────────
  lint-test-server:
    name: Lint & Test – Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: server

      - name: Run server tests
        run: npm run test --workspace=server

      - name: Run server tests with coverage
        run: npm run test:coverage --workspace=server

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 14

  # ── Client: type-check + build unified client app ─────────────────────────
  # client/app is the single unified SPA (view screen + phone controller).
  lint-build-client:
    name: Lint & Build – Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root workspace dependencies
        run: npm install

      - name: Type-check & build client/app
        run: npm run build --workspace=client/app

  # ── Operator: vet + unit tests ─────────────────────────────────────────────
  lint-test-operator:
    name: Lint & Test – Operator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum

      - name: Vet operator
        run: go vet ./...
        working-directory: operator

      - name: Run operator tests
        run: go test ./...
        working-directory: operator

  # ── Helm chart: lint ───────────────────────────────────────────────────────
  lint-helm:
    name: Lint – Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/gamma-operator

  # ── E2E: Playwright ────────────────────────────────────────────────────────
  e2e:
    name: E2E – Playwright
    runs-on: ubuntu-latest
    needs: [lint-test-server, lint-build-client]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build --workspace=client/app

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
