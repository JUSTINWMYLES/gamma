name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  # ── Determine next version from conventional commits ────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for commit analysis

      - name: Determine version bump from commits
        id: bump
        run: |
          # Get the latest tag (or default to v0.0.0)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyse commits since last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since last tag."
            exit 0
          fi

          # Determine bump level from conventional commit prefixes
          # BREAKING CHANGE or commits containing ! after type → major
          # feat: → minor
          # fix:, perf:, refactor:, docs:, chore:, ci:, test:, build:, style: → patch
          BUMP="none"

          while IFS= read -r msg; do
            # Check for breaking changes
            if echo "$msg" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING[ -]CHANGE"; then
              BUMP="major"
              break
            fi
            # Check for features
            if echo "$msg" | grep -qiE "^feat(\(.+\))?:"; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
            # Check for fixes and other patch-level changes
            if echo "$msg" | grep -qiE "^(fix|perf|refactor|docs|chore|ci|test|build|style)(\(.+\))?:"; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          # If no conventional commits found, default to patch
          if [ "$BUMP" = "none" ]; then
            BUMP="patch"
          fi

          # Compute new version
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Version bump: $BUMP → v$NEW_VERSION"

  # ── Create git tag ─────────────────────────────────────────────────────────
  tag:
    name: Create Tag
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.version.outputs.new_version }}" \
            -m "Release v${{ needs.version.outputs.new_version }}"
          git push origin "v${{ needs.version.outputs.new_version }}"

  # ── Build and push all Docker images ───────────────────────────────────────
  build-push-images:
    name: Build & Push – ${{ matrix.name }}
    needs: [version, tag]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gamma-server
            context: .
            dockerfile: server/Dockerfile
          - name: gamma-client
            context: .
            dockerfile: client/app/Dockerfile
          - name: gamma-operator
            context: operator
            dockerfile: operator/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure Git LFS files are fetched
        run: git lfs pull

      - name: Verify LFS assets are real files (not pointers)
        if: matrix.name == 'gamma-client' || matrix.name == 'gamma-server'
        run: |
          echo "Checking audio/model file sizes..."
          fail=0
          for f in audio/*.mp3 audio/*.wav audio/*.flac models/*.glb; do
            [ -f "$f" ] || continue
            size=$(stat --format=%s "$f")
            if [ "$size" -lt 1000 ]; then
              echo "FAIL: $f is $size bytes (LFS pointer, not real file)"
              head -3 "$f"
              fail=1
            else
              echo "  OK: $f ($size bytes)"
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "::error::Git LFS files were not fetched. Audio will be broken in the image."
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ needs.version.outputs.new_version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Push Helm chart as an OCI image ────────────────────────────────────────
  push-helm-oci:
    name: Push Helm Chart (OCI)
    needs: [version, tag]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          helm package helm/gamma-operator \
            --version "$VERSION" \
            --app-version "$VERSION"

      - name: Push Helm chart to GHCR
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "gamma-operator-${VERSION}.tgz" \
            "oci://ghcr.io/${OWNER}/helm-charts"

  # ── Create GitHub release with npm tarball + client build tarball ───────────
  create-release:
    name: Create GitHub Release
    needs: [version, tag]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure Git LFS files are fetched
        run: git lfs pull

      - name: Verify LFS assets are real files (not pointers)
        run: |
          fail=0
          for f in audio/*.mp3 audio/*.wav audio/*.flac models/*.glb; do
            [ -f "$f" ] || continue
            size=$(stat --format=%s "$f")
            if [ "$size" -lt 1000 ]; then
              echo "FAIL: $f is $size bytes (LFS pointer)"
              fail=1
            else
              echo "  OK: $f ($size bytes)"
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root workspace dependencies
        run: npm install

      - name: Build server
        run: npm run build --workspace=server

      - name: Build client/app
        run: npm run build --workspace=client/app

      - name: Set server package version for release asset
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          npm pkg set version="$VERSION" --prefix server

      - name: Pack server npm tarball
        working-directory: server
        run: npm pack --pack-destination ..

      - name: Create client build tarball
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          tar -czf "$GITHUB_WORKSPACE/gamma-client-${VERSION}.tar.gz" -C client/app/dist .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          files: |
            gamma-server-${{ needs.version.outputs.new_version }}.tgz
            gamma-client-${{ needs.version.outputs.new_version }}.tar.gz
